<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Customer Support Assistant</title>

    <link rel="icon" href="assets/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

<script src="js/auth-guard.js"></script>

<script>
    // This page has no unique content of its own — if we got here
    // (i.e. auth-guard.js didn't already redirect to login.html),
    // it means we're logged in, so go straight to the dashboard.
    if (window.SupportAIAuth && window.SupportAIAuth.getToken()) {
        window.location.replace("dashboard.html");
    }
</script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Sidebar -->

    <div id="sidebar-container"></div>

    <script>

        fetch("components/sidebar.html")
        .then(response => response.text())
        .then(data => {

            document.getElementById("sidebar-container").innerHTML = data;

            lucide.createIcons();

        });

    </script>

    <script src="js/app.js"></script>
</body>

</html>
